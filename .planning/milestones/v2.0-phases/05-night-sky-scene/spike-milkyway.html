<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spike — Milky Way + Starfield (throwaway prototype)</title>
<style>
  /* Throwaway standalone spike prototype — exempt from the zero-hex-literal
     doctrine (.planning/phases/05-night-sky-scene/05-01-PLAN.md), matches the
     project's existing .planning/reference/prototype-*.html convention:
     single self-contained file, inline style + inline module script, no build step. */
  html, body { margin: 0; height: 100%; background: #05070a; overflow: hidden; }
  #sky { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 10px; left: 10px; z-index: 2;
    font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
    font-size: 11.5px; color: #aab2bd; background: rgba(12,15,19,.82);
    border: 1px solid #28303b; border-radius: 8px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px; max-width: 280px;
  }
  #hud b { color: #eef2fa; }
  #hud .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  #hud button {
    font: inherit; cursor: pointer; background: none; border: 1px solid #28303b;
    color: #aab2bd; border-radius: 5px; padding: 3px 7px;
  }
  #hud button.active { border-color: #d99163; color: #eef2fa; }
  body.ui-off #hud { display: none; }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="hud">
  <div><b>Milky Way spike</b> — DPR <span id="dprOut">?</span>, ladder step <span id="ladderOut">?</span></div>
  <div class="row">
    ladder:
    <button data-ladder="0">0 naive</button>
    <button data-ladder="1">1 +jitter</button>
    <button data-ladder="2">2 +layered</button>
    <button data-ladder="3">3 +coarse (final)</button>
  </div>
  <div class="row">
    dpr override:
    <button data-dpr="">auto</button>
    <button data-dpr="1">1</button>
    <button data-dpr="2">2</button>
  </div>
  <div>append <code>?ui=0</code> to the URL for a clean capture (hides this panel).</div>
</div>

<script type="module">
'use strict';

// -------- query params (?dpr=1|2, ?ladder=0..3, ?ui=0) --------
const qs = new URLSearchParams(location.search);
let dprOverride = qs.get('dpr');
let ladder = qs.has('ladder') ? parseInt(qs.get('ladder'), 10) : 3; // default = final chosen technique
if (qs.get('ui') === '0') document.body.classList.add('ui-off');

// -------- sky tokens (provisional values from 05-UI-SPEC.md Sky Palette;
// literal hex here is intentional -- this file is exempt from the zero-hex
// doctrine, it never ships) --------
const TOK = {
  zenith: '#05070a',
  horizon: '#141a2c',
  milkyway: '#cfd9f2',
  star: '#eef2fa',
};

const HORIZON_Y = 0.85; // bottom 15% of viewport is ground, per 05-UI-SPEC.md

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1;

// -------- seeded RNG so repeated renders (dpr1 vs dpr2 captures) use the
// same starfield/band layout -- makes the two screenshots comparable --------
function mulberry32(seed) {
  let a = seed;
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
let rand = mulberry32(20260717);

function hexToRgb(hex) {
  const v = parseInt(hex.slice(1), 16);
  return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
}
function rgba(hex, a) {
  const c = hexToRgb(hex);
  return `rgba(${c[0]},${c[1]},${c[2]},${a})`;
}

// -------- sky gradient + per-pixel dither (insurance against linear-gradient
// banding on the base wash, independent of the Milky Way band technique).
// NOTE: a first attempt used a small tiled noise pattern via
// ctx.createPattern(..., 'repeat') -- that produced a visible repeating grid
// artifact under zoom (a FAIL indicator per RESEARCH Pattern 1: "visible seam
// or repeating pattern"), so this uses true per-pixel getImageData/putImageData
// noise instead, which has no periodicity. --------
function clamp255(v) { return v < 0 ? 0 : v > 255 ? 255 : v; }
function ditherSky() {
  const w = canvas.width;
  const h = Math.round(H * HORIZON_Y * DPR);
  if (w <= 0 || h <= 0) return;
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (rand() - 0.5) * 6; // +/-3 levels -- breaks up smooth-gradient banding, imperceptible as texture
    d[i] = clamp255(d[i] + n);
    d[i + 1] = clamp255(d[i + 1] + n);
    d[i + 2] = clamp255(d[i + 2] + n);
  }
  ctx.putImageData(imgData, 0, 0);
}
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H * HORIZON_Y);
  g.addColorStop(0, TOK.zenith);
  g.addColorStop(1, TOK.horizon);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H * HORIZON_Y);
  ctx.fillStyle = TOK.zenith; // ground = flat zenith tone, per 05-UI-SPEC.md
  ctx.fillRect(0, H * HORIZON_Y, W, H - H * HORIZON_Y);
  ditherSky();
}

// -------- starfield: power-law magnitude bands (05-UI-SPEC.md Star density
// & magnitude bands table) -- radius AND alpha both driven by magnitude --------
const BANDS = [
  { share: 0.65, rMin: 0.5, rMax: 0.7, aMin: 0.10, aMax: 0.20 },
  { share: 0.22, rMin: 0.7, rMax: 1.0, aMin: 0.25, aMax: 0.40 },
  { share: 0.10, rMin: 1.0, rMax: 1.4, aMin: 0.45, aMax: 0.65 },
  { share: 0.03, rMin: 1.4, rMax: 2.0, aMin: 0.70, aMax: 1.00 },
];

function starCountForViewport() {
  const refArea = 1440 * 900;
  const area = W * H;
  const n = Math.round(700 * (area / refArea));
  return Math.max(350, Math.min(1200, n));
}

let starList = [];
function buildStars() {
  starList = [];
  const total = starCountForViewport();
  for (const band of BANDS) {
    const n = Math.round(total * band.share);
    for (let i = 0; i < n; i++) {
      // Math.pow(rand(), N) biases toward the low end -- power-law-ish
      // continuous variation within each band (never a uniform sprinkle).
      const t = Math.pow(rand(), 2.2);
      starList.push({
        x: rand() * W,
        y: rand() * H * HORIZON_Y,
        r: band.rMin + t * (band.rMax - band.rMin),
        a: band.aMin + t * (band.aMax - band.aMin),
      });
    }
  }
}
function drawStars() {
  ctx.save();
  for (const s of starList) {
    ctx.fillStyle = rgba(TOK.star, s.a);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// -------- Milky Way band --------
// Angle ~24 deg from vertical (20-25 deg per 05-UI-SPEC.md), core sweeping
// from upper-middle toward the right margin near the horizon.
const BAND_X_TOP = 0.63;
const BAND_X_BOTTOM = 0.87;

function bandCenterX(yFrac) {
  const t = Math.min(1, yFrac / HORIZON_Y);
  return (BAND_X_TOP + (BAND_X_BOTTOM - BAND_X_TOP) * t) * W;
}
function bandIntensity(yFrac) {
  // Brighter toward the horizon/right (the "core" per 05-UI-SPEC.md
  // Milky Way composition), tapering higher up -- stays inside a believable range.
  const t = Math.min(1, yFrac / HORIZON_Y);
  return 0.35 + 0.65 * t;
}

// ladder=0: single flat radial gradient, no jitter, no layering.
// This is the NAIVE baseline used only for internal ladder-step comparison
// (expected to show ring banding) -- NOT the technique used for the
// judged dpr1/dpr2 screenshots (those use the default ladder=3 technique below).
function drawMilkyWayNaive() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const yFrac = 0.42, y = yFrac * H, cx = bandCenterX(yFrac);
  const r = 260 * (H / 900);
  const grad = ctx.createRadialGradient(cx, y, 0, cx, y, r);
  grad.addColorStop(0, rgba(TOK.milkyway, 0.5));
  grad.addColorStop(0.5, rgba(TOK.milkyway, 0.2));
  grad.addColorStop(1, rgba(TOK.milkyway, 0));
  ctx.fillStyle = grad;
  ctx.translate(cx, y);
  ctx.rotate((24 * Math.PI) / 180);
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 1.8, r * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ladder>=1 (jitter), >=2 (layered passes): several soft radial blobs laid
// along the band path, offset + radius/alpha varied per pass -- avoids a
// single gradient's visible concentric rings (recovery ladder steps 1+2).
function drawMilkyWayHaze() {
  const steps = 22;
  const passes = ladder >= 2 ? 4 : 1;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let p = 0; p < passes; p++) {
    const baseAlpha = 0.035 + p * 0.012; // 0.035 - 0.071 per pass, within 0.04-0.10 UI-SPEC range
    const radiusBase = 90 + p * 38;
    for (let i = 0; i <= steps; i++) {
      const yFrac = (i / steps) * HORIZON_Y;
      const y = yFrac * H;
      const jitterOn = ladder >= 1 ? 1 : 0;
      const cx = bandCenterX(yFrac) + (rand() - 0.5) * 26 * jitterOn;
      const cy = y + (rand() - 0.5) * 26 * jitterOn;
      const r = (radiusBase + rand() * 40) * (H / 900);
      const a = baseAlpha * bandIntensity(yFrac) * (0.7 + rand() * 0.6);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      grad.addColorStop(0, rgba(TOK.milkyway, a));
      grad.addColorStop(1, rgba(TOK.milkyway, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ladder>=3: second, coarser scatter pass of larger/dimmer dots along the
// band's transition zones (recovery ladder step 3) -- also doubles as the
// primary dust-lane texture (fine pass) for the default technique.
function drawMilkyWayDust(coarse) {
  const count = coarse ? 260 : 1400;
  const sizeMin = coarse ? 1.4 : 0.5;
  const sizeMax = coarse ? 2.6 : 1.6;
  const alphaMin = coarse ? 0.05 : 0.08;
  const alphaMax = coarse ? 0.12 : 0.30;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < count; i++) {
    const yFrac = rand() * HORIZON_Y;
    const y = yFrac * H;
    const cx = bandCenterX(yFrac);
    const sigma = (coarse ? 130 : 85) * (H / 900);
    // sum-of-uniforms approximates a soft gaussian falloff perpendicular to the band
    const jitter = ((rand() + rand() + rand() + rand()) / 4 - 0.5) * 2 * sigma * 2.4;
    const x = cx + jitter;
    if (x < 0 || x > W) continue;
    const distNorm = Math.abs(jitter) / (sigma * 2.4);
    const falloff = Math.max(0, 1 - distNorm);
    const intensity = bandIntensity(yFrac) * falloff;
    if (intensity <= 0.02) continue;
    const r = (sizeMin + rand() * (sizeMax - sizeMin)) * Math.min(DPR, 1.6);
    const a = (alphaMin + rand() * (alphaMax - alphaMin)) * intensity;
    ctx.fillStyle = rgba(TOK.milkyway, a);
    ctx.beginPath();
    ctx.arc(x, y + (rand() - 0.5) * 6, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawMilkyWay() {
  if (ladder === 0) { drawMilkyWayNaive(); return; }
  drawMilkyWayHaze();
  drawMilkyWayDust(false);
  if (ladder >= 3) drawMilkyWayDust(true);
}

// -------- render --------
function render() {
  rand = mulberry32(20260717); // reset seed so every render (resize/dpr toggle) is comparable
  ctx.clearRect(0, 0, W, H);
  drawSky();
  buildStars();
  drawStars();
  drawMilkyWay();
  document.getElementById('dprOut').textContent = DPR.toFixed(2);
  document.getElementById('ladderOut').textContent = String(ladder);
  document.querySelectorAll('#hud [data-ladder]').forEach((b) => {
    b.classList.toggle('active', parseInt(b.dataset.ladder, 10) === ladder);
  });
  document.querySelectorAll('#hud [data-dpr]').forEach((b) => {
    b.classList.toggle('active', b.dataset.dpr === (dprOverride || ''));
  });
}

function resize() {
  const rect = canvas.getBoundingClientRect();
  DPR = Math.min(dprOverride ? parseFloat(dprOverride) : window.devicePixelRatio || 1, 2);
  W = Math.round(rect.width);
  H = Math.round(rect.height);
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  render();
}

window.addEventListener('resize', resize);
document.querySelectorAll('#hud [data-ladder]').forEach((b) => {
  b.addEventListener('click', () => { ladder = parseInt(b.dataset.ladder, 10); render(); });
});
document.querySelectorAll('#hud [data-dpr]').forEach((b) => {
  b.addEventListener('click', () => { dprOverride = b.dataset.dpr || null; resize(); });
});

resize();
</script>
</body>
</html>
